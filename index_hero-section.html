<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Section</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0a0f1e; --off-white: #f0ece3; --amber: #e8a020; }
    html, body { height: 100%; font-family: "Space Grotesk", sans-serif; }

    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      background: var(--navy);
    }
    .hero__photo-panel { position: relative; min-height: 60vh; }
    .hero__photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
    }
    .hero__photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(10,15,30,0.1) 0%, rgba(10,15,30,0.6) 75%, rgba(10,15,30,1.0) 100%);
    }
    .hero__photo::before {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(to top, var(--navy), transparent);
      z-index: 1;
    }
    .hero__content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem,6vw,5rem) clamp(1.5rem,5vw,4rem) clamp(2rem,6vw,5rem) 2rem;
    }
    .hero__eyebrow {
      font-family: "Space Mono", monospace;
      font-size: clamp(0.6rem,1.2vw,0.75rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero__eyebrow::before {
      content: "";
      display: block;
      width: 32px; height: 1px;
      background: var(--amber);
      opacity: 0.7;
    }
    .hero__name {
      font-size: clamp(2.4rem,4.5vw,4.2rem);
      font-weight: 700;
      line-height: 1.0;
      color: var(--off-white);
      letter-spacing: -0.025em;
    }
    .hero__name em {
      font-style: normal;
      font-weight: 300;
      color: rgba(240,236,227,0.5);
      display: block;
      font-size: clamp(1.1rem,2vw,1.8rem);
      letter-spacing: 0.04em;
      margin-top: 0.4rem;
    }
    .hero__tagline {
      font-size: clamp(0.88rem,1.5vw,1.05rem);
      color: rgba(240,236,227,0.65);
      margin: 1.8rem 0 2.6rem;
      line-height: 1.7;
      max-width: 380px;
    }
    .hero__cta-group { display: flex; gap: 0.9rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(0.78rem,1.2vw,0.88rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85em 1.8em;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
      border: 2px solid transparent;
    }
    .btn:focus-visible { outline: 3px solid var(--amber); outline-offset: 4px; }
    .btn--primary { background: var(--amber); color: var(--navy); border-color: var(--amber); }
    .btn--primary:hover { background: #f0b030; border-color: #f0b030; transform: translateY(-2px); }
    .btn--primary:active { transform: translateY(0); }
    .btn--ghost { background: transparent; color: var(--off-white); border-color: rgba(240,236,227,0.35); }
    .btn--ghost:hover { border-color: var(--off-white); background: rgba(240,236,227,0.07); transform: translateY(-2px); }
    .btn svg { width: 1em; height: 1em; transition: transform 0.2s; }
    .btn--primary:hover svg { transform: translateX(3px); }
    .hero__scroll {
      position: absolute;
      bottom: 2rem; right: clamp(1.5rem,5vw,4rem);
      z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      font-family: "Space Mono", monospace;
      font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(240,236,227,0.3);
      animation: nudge 2.4s ease-in-out infinite;
    }
    .hero__scroll span { display: block; width: 1px; height: 36px; background: linear-gradient(to bottom, rgba(240,236,227,0.3), transparent); }
    @keyframes nudge { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
    @media (max-width: 700px) {
      .hero { grid-template-columns: 1fr; grid-template-rows: 55vh auto; }
      .hero__photo-panel { min-height: 55vh; }
      .hero__photo::after { background: linear-gradient(to bottom, rgba(10,15,30,0.1) 0%, rgba(10,15,30,0.5) 70%, rgba(10,15,30,1.0) 100%); }
      .hero__content { padding: 2rem 1.5rem 4rem; }
    }
    @media (max-width: 400px) {
      .btn { width: 100%; justify-content: center; }
      .hero__cta-group { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) { .btn,.hero__scroll { transition: none; animation: none; } }
  </style>
</head>
